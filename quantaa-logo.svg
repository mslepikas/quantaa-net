<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100">
  <!-- Background -->
  <rect width="200" height="100" fill="white"/>
  
  <!-- Network nodes in Q shape -->
  <circle cx="50" cy="50" r="15" fill="#1A365D"/>
  <circle cx="100" cy="30" r="12" fill="#00BFFF"/>
  <circle cx="150" cy="50" r="15" fill="#1A365D"/>
  <circle cx="100" cy="70" r="12" fill="#00BFFF"/>
  
  <!-- Connecting lines to represent network -->
  <line x1="50" y1="50" x2="100" y2="30" stroke="#1A365D" stroke-width="2"/>
  <line x1="100" y1="30" x2="150" y2="50" stroke="#1A365D" stroke-width="2"/>
  <line x1="150" y1="50" x2="100" y2="70" stroke="#1A365D" stroke-width="2"/>
  <line x1="100" y1="70" x2="50" y2="50" stroke="#1A365D" stroke-width="2"/>
  
  <!-- Q shape formed by network nodes -->
  <path d="M60 25 Q100 20 140 25 Q160 35 160 50 Q160 65 140 70 Q100 75 60 70 Q40 65 40 50 Q40 35 60 25" 
        fill="none" stroke="#1A365D" stroke-width="3"/>
  
  <!-- Text -->
  <text x="100" y="90" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1A365D">Quantaa</text>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#00BFFF">.net</text>
  
  <!-- Accent elements -->
  <circle cx="80" cy="40" r="3" fill="#00BFFF"/>
  <circle cx="120" cy="60" r="3" fill="#00BFFF"/>
  <circle cx="130" cy="40" r="2" fill="#00BFFF"/>
</svg>